name: PayGrid CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contracts-test-and-build:
    name: Smart Contracts (Soroban Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none, wasm32-unknown-unknown

      - name: Cargo Cache
        uses: Swatinem/rust-cache@v2

      - name: Pin Dependencies for Rust Compatibility
        run: cargo update -p ed25519-dalek@3.0.0 --precise 2.2.0 || true

      - name: Run Soroban Contract Unit Tests
        run: cargo test

      - name: Build Soroban WASM Binaries
        run: cargo build --target wasm32v1-none --release || cargo build --target wasm32-unknown-unknown --release

  frontend-build-and-test:
    name: Frontend (Next.js & Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: cd frontend && npm install

      - name: Run Vitest Unit Tests
        run: cd frontend && npm run test

      - name: Build Next.js Application (Static Export)
        run: cd frontend && npm run build
